# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New + → Blueprint → conecte este repositório.
services:
  - type: web
    name: rzrd-tech
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npx next start -p $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NODE_ENV
        value: production
