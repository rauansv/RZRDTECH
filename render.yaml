# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New + → Blueprint → conecte este repositório.
services:
  - type: web
    name: rzrd-tech
    runtime: node
    plan: free
    region: oregon
    branch: main
    # --include=dev garante que devDependencies (tailwind, typescript,
    # @tailwindcss/postcss) sejam instaladas — elas são necessárias no build.
    # NÃO defina NODE_ENV=production aqui: isso faz o npm pular as devDependencies.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx next start -p $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
